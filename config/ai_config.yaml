# Casino AI - AI Configuration
# ===============================================================

# Reinforcement Learning Settings
reinforcement_learning:
  # Algorithms
  algorithm: "PPO"       # PPO, DQN, A2C, SAC
  learning_rate: 0.0003
  gamma: 0.99           # Discount factor
  gae_lambda: 0.95      # GAE parameter
  clip_ratio: 0.2       # PPO clip parameter
  value_coef: 0.5       # Value loss coefficient
  entropy_coef: 0.01    # Entropy coefficient
  
  # Training
  batch_size: 64
  epochs: 1000
  hidden_layers: [256, 128, 64]
  activation: "relu"
  optimizer: "adam"

# Neural Network Architectures
neural_networks:
  blackjack:
    # State representation
    input_size: 372  # 52 cards * 6 decks + 10 actions + 10 dealer cards
    card_embedding_size: 32  # Embedding for each card
    positional_encoding: true
    
    # Architecture
    hidden_layers: [512, 256, 128]
    activation: "relu"
    dropout: 0.2
    batch_norm: true
    
    # Output
    output_size: 6  # hit, stand, double, split, surrender, insurance
    output_activation: "softmax"
    temperature: 1.0  # Sampling temperature
    
    # Loss
    loss_function: "categorical_crossentropy"
    metrics: ["accuracy"]

# Training Configuration
training:
  # Dataset
  episodes_per_game: 100000
  validation_split: 0.2
  test_split: 0.1
  
  # Optimization
  learning_rate_schedule: "cosine"
  warmup_epochs: 10
  early_stopping_patience: 50
  save_best_only: true
  
  # Checkpoints
  checkpoint_dir: "data/training_data/checkpoints"
  checkpoint_frequency: 10  # Save every 10 epochs
  tensorboard_log_dir: "data/training_data/logs"

# Inference Settings
inference:
  device: "cpu"        # cpu or cuda
  batch_size: 1        # Batch size for inference
  temperature: 1.0     # Sampling temperature
  top_p: 0.9           # Nucleus sampling
  top_k: 40            # Top-k sampling
  deterministic: false # Use deterministic sampling

